<!-- ARCHIVO CENTRALIZADO DE PLANTILLAS -->
<div style="display:none;" id="global-templates">

    <!-- PLANTILLA: TARJETA DE PRODUCTO -->
    <template id="tpl-product-card">
        <div class="product-card glass-effect" id="card-{p_id}">
            {fav_btn}
            <div class="product-image-container">
                <button onclick="event.stopPropagation(); flipCardImg('{p_id}', -1)" class="product-nav-btn left">‹</button>
                <div id="card-img-container-{p_id}" onclick="openProductDetail(window.productDataCache['{p_id}'])" class="product-img-wrapper">
                    {img_content}
                </div>
                <button onclick="event.stopPropagation(); flipCardImg('{p_id}', 1)" class="product-nav-btn right">›</button>
            </div>

            <div class="product-info">
                <h4 class="product-title">{nombre}</h4>
                <div class="product-rating">⭐ {product_rating} <span class="product-rating-count">({product_sales} ventas)</span></div>
                <div class="product-price">{precio} <span class="product-price-currency">COP</span></div>
            </div>

            {qty_selector_html}

            <div class="product-actions">
                {add_btn_html}
                <button onclick="openProductDetail(window.productDataCache['{p_id}'])" class="btn-search-detail">🔎</button>
            </div>
        </div>
    </template>

    <!-- PLANTILLA: DETALLE DE PRODUCTO (MODAL) -->
    <template id="tpl-product-detail">
        <div class="product-detail-grid">
            <!-- COLUMNA IZQUIERDA: Imagen -->
            <div>
                <div class="detail-img-container">
                    <button onclick="moveGallery(-1)" class="detail-nav-btn left">‹</button>
                    <div id="detailMainImageContainer" class="detail-main-img-wrapper">
                        {main_img}
                    </div>
                    <button onclick="moveGallery(1)" class="detail-nav-btn right">›</button>
                </div>

                <!-- PREGUNTAS (debajo de imagen, compactas) -->
                <div class="questions-section">
                    <div class="section-header">
                        <div class="section-dot blue"></div>
                        <p class="section-title-sm">Preguntas al Vendedor</p>
                    </div>
                    <div id="questionsContainer" class="questions-list">
                        {qsHtml}
                    </div>
                    <div class="question-input-wrapper">
                        <textarea id="newQuestionTxt" placeholder="Haz una pregunta..." class="question-textarea"></textarea>
                        <button onclick="submitUserQuestion('{p_id}')" class="cta-primary btn-send-question">Enviar</button>
                    </div>
                </div>
            </div>

            <!-- COLUMNA DERECHA -->
            <div class="detail-right-col">
                <div class="seller-badge-container">
                    <div class="seller-icon">👤</div>
                    <div>
                        <p class="seller-title-sm">Vendedor Oficial</p>
                        <p class="seller-link-wrapper"><a href="/pages/seller-profile.html?vendor_id={sellerId}" class="seller-link">{sellerName} &rarr;</a></p>
                    </div>
                </div>

                <h2 class="detail-title">{nombre}</h2>
                <div class="detail-rating-container">
                    <span class="detail-rating-stars">⭐ {product_rating}</span>
                    <span class="detail-rating-text">({product_sales} veces comprado) • Vendedor verificado</span>
                </div>

                <p class="detail-price">{precioTexto} <span class="detail-price-currency">COP</span></p>

                <!-- STOCK -->
                {stock_badge_html}
                
                <div class="detail-desc-box">
                    <p class="detail-desc-text">{desc}</p>
                </div>

                <!-- RESEÑAS (compactas en columna derecha) -->
                <div class="reviews-section">
                    <div class="section-header">
                        <div class="section-dot yellow"></div>
                        <p class="section-title-sm">Reseñas</p>
                    </div>
                    <div id="reviewsContainer" class="reviews-list">
                        {reviewsHtml}
                    </div>
                </div>

                <div class="detail-actions">
                    {modal_add_btn_html}
                    {btn_fav_modal}
                </div>
                
                <p class="detail-footer-info">📦 Envío prioritario Konrad • 🛡️ Garantía Premium • 💳 SSL</p>
            </div>
        </div>
    </template>
</div>
