<!DOCTYPE html>
<html lang="es-co">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña | Konrad Shop</title>
    <!-- Mismos estilos y tipografías -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../src/css/style.css" />
</head>

<body style="display: flex; justify-content: center; align-items: center; height: 100vh;">

    <!-- Bolas de neón flotantes -->
    <div class="floating-orb orb-1"
        style="width: 350px; height: 350px; top: 5%; right: 15%; background: linear-gradient(135deg, var(--secondary), #f472b6);">
    </div>
    <div class="floating-orb orb-2" style="width: 450px; height: 450px; bottom: 5%; left: 5%;"></div>

    <!-- TARJETA DE RECUPERACIÓN -->
    <div class="product-card" style="width: 100%; max-width: 420px; z-index: 10; padding: 45px 35px;">
        <!-- Botón para volver al login -->
        <a href="login.html"
            style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem; margin-bottom: 20px; display: inline-block;">
            ← Volver al Login
        </a>

        <div style="text-align: center; margin-bottom: 30px; margin-top: 10px;">
            <div style="font-size: 3rem; margin-bottom: 10px;">🔐</div>
            <h2 style="font-size: 1.8rem; color: var(--text-light); margin-bottom: 8px;">¿Olvidaste tu Contraseña?</h2>
            <p style="color: var(--text-muted); font-size: 0.95rem; line-height: 1.5;">
                No te preocupes. Ingresa tu correo electrónico registrado y te enviaremos las instrucciones de
                recuperación.
            </p>
        </div>

        <form id="recoverForm">
            <div style="margin-bottom: 30px;">
                <label style="display: block; font-size: 0.9rem; color: var(--text-muted); margin-bottom: 8px;">Correo
                    Electrónico</label>
                <div style="position: relative;">
                    <span style="position: absolute; left: 15px; top: 12px; opacity: 0.6;"></span>
                    <input type="email" id="email" class="search-bar"
                        style="width: 100%; border-radius: 8px; padding-left: 45px;" placeholder="ejemplo@konrad.edu.co"
                        required>
                </div>
            </div>

            <button type="submit" class="cta-primary" style="width: 100%;">Enviar Instrucciones</button>
        </form>
    </div>

</body>

</html>
