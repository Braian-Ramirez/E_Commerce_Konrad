<!DOCTYPE html>
<html lang="es-co">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil | Comercial Konrad</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/css/style.css">
    <link rel="stylesheet" href="/src/css/buyer-common.css">
    <link rel="stylesheet" href="/src/css/profile.css">
</head>
<body>
    <header class="navbar">
        <div class="nav-brand">
            <a href="/index.html" style="text-decoration: none;">
                <h1>🛍️Comercial<span style="color: var(--primary);">Konrad</span></h1>
            </a>
        </div>
        <div class="search-container" style="visibility: hidden;">
            <div class="search-wrapper">
                <span>🔍</span>
                <input type="text" placeholder="Buscar productos... (ej: Sony, Mac)">
            </div>
        </div>
        <nav class="nav-links">
            <a href="/pages/buyer-dashboard.html" class="nav-item">🏠 <span>Inicio</span></a>
            <a href="/pages/catalog.html" class="nav-item">💎 <span>Catálogo</span></a>
            <button class="cart-btn" onclick="window.location.href='/pages/cart.html'">🛒 <span>Carrito</span> <span id="cartCount" class="badge">0</span></button>
        </nav>
    </header>

    <div class="dashboard-container">
        <aside class="sidebar-nav">
          <div class="sidebar-section">
            <p class="section-title">Navegación</p>
            <a href="/pages/buyer-dashboard.html" class="sidebar-item"><span class="icon">🏠</span> Inicio</a>
            <a href="/pages/my-orders.html" class="sidebar-item"><span class="icon">🛍️</span> Mis Compras</a>
            <a href="/pages/favorites.html" class="sidebar-item"><span class="icon">❤️</span> Favoritos</a>
            <a href="/pages/payment-methods.html" class="sidebar-item"><span class="icon">💳</span> Medios de Pago</a>
            <a href="/pages/profile.html" class="sidebar-item active"><span class="icon">👤</span> Mi Perfil</a>
          </div>
          <button onclick="handleLogout()" class="logout-btn">🚪 Cerrar Sesión</button>
        </aside>

        <main class="main-content">
            <div class="profile-container glass-effect">
                <div class="avatar-section">
                    <div id="avatarCircle" class="avatar-circle">V</div>
                    <label class="file-upload-btn">
                        📷 Cambiar Foto de Perfil
                        <input type="file" id="avatarInput" accept="image/*" style="display: none;">
                    </label>
                </div>

                <!-- FORMULARIO DE PERFIL PROFESIONAL -->
                <form id="profileForm" class="profile-main-form">
                    <div class="form-grid">
                        <div class="input-group">
                            <label>Nombre Completo</label>
                            <input type="text" id="nombre" value="Viviana" required>
                        </div>
                        <div class="input-group">
                            <label>Apellidos</label>
                            <input type="text" id="apellido" value="García" required>
                        </div>
                        <div class="input-group">
                            <label>Email de Contacto</label>
                            <input type="email" id="email" disabled>
                        </div>
                        <div class="input-group">
                            <label>Teléfono Móvil</label>
                            <input type="text" id="telefono">
                        </div>
                        <div class="input-group">
                            <label>País / Región</label>
                            <input type="text" id="pais" placeholder="Colombia">
                        </div>
                        <div class="input-group">
                            <label>Ciudad / Estado</label>
                            <input type="text" id="ciudad" placeholder="Bogotá">
                        </div>
                        <div class="input-group">
                            <label>Dirección de Residencia</label>
                            <input type="text" id="direccion" placeholder="Calle ...">
                        </div>
                        <div class="input-group">
                            <label>Nombre de Usuario @Instagram</label>
                            <input type="text" id="instagram" placeholder="@user">
                        </div>
                    </div>
                    <button type="submit" class="cta-primary profile-save-btn">✅ Guardar Cambios del Perfil</button>
                </form>

                <div class="security-divider">
                    <h3 class="security-title">🔐 Seguridad y Contraseña</h3>
                    <div class="form-grid">
                        <div class="input-group">
                            <label>Nueva Contraseña</label>
                            <input type="password" id="new_password" placeholder="••••••••">
                        </div>
                        <div class="input-group">
                            <label>Confirmar Contraseña</label>
                            <input type="password" id="confirm_password" placeholder="••••••••">
                        </div>
                        <!-- MENSAJE INFORMATIVO DE SEGURIDAD -->
                        <div class="security-info-box">
                            <p>💡 <b>Consejo de Seguridad:</b> Tu contraseña debe ser de al menos <b>8 caracteres</b> para garantizar la protección de tu cuenta Konrad.</p>
                        </div>
                    </div>
                    <div style="display: flex; justify-content: center; width: 100%; margin-top: 25px;">
                        <button id="changePassBtn" class="cta-primary security-btn" style="width: auto; min-width: 300px;">Actualizar Seguridad</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="/src/js/profile.js"></script>
</body>

    <script type="module" src="/src/js/profile.js"></script>
</body>
</html>
