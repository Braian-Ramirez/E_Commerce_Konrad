<!DOCTYPE html>
<html lang="es-co">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Konrad Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../src/css/style.css" />
</head>

<body style="display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; background: #0c0a09; margin: 0; padding: 20px; box-sizing: border-box;">

    <!-- Bolas de neón de fondo corregidas para móvil -->
    <div class="floating-orb orb-1" style="width: min(400px, 80vw); height: min(400px, 80vw); top: 5%; right: -5%;"></div>
    <div class="floating-orb orb-2" style="width: min(500px, 90vw); height: min(500px, 90vw); bottom: -10%; left: -5%;"></div>

    <!-- TARJETA DE LOGIN -->
    <div class="product-card" style="width: 100%; max-width: 400px; z-index: 10; padding: 40px; box-sizing: border-box;">
        <div style="text-align: center; margin-bottom: 30px;">
            <a href="../index.html" style="text-decoration: none;">
                <h1 style="font-size: 2rem; color: var(--text-light); font-weight: 800;">🛍️ Comercial <span
                        style="color: var(--primary);">Konrad</span></h1>
            </a>
            <p style="color: var(--text-muted); margin-top: 5px;">Bienvenido de nuevo</p>
        </div>

        <form id="loginForm">
            <div style="margin-bottom: 20px;">
                <label style="display: block; font-size: 0.9rem; color: #a8a29e; margin-bottom: 8px;">Correo Electrónico</label>
                <input type="email" id="email" class="search-bar" style="width: 100%; border-radius: 8px; background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); padding: 12px;"
                    placeholder="ejemplo@konradlorenz.edu.co" required>
            </div>

            <div style="margin-bottom: 30px;">
                <label style="display: block; font-size: 0.9rem; color: #a8a29e; margin-bottom: 8px;">Contraseña</label>
                <input type="password" id="password" class="search-bar" style="width: 100%; border-radius: 8px; background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); padding: 12px;"
                    placeholder="••••••••" required>
            </div>

            <button type="submit" class="cta-primary" style="width: 100%; margin-bottom: 20px; cursor: pointer; padding: 15px; border-radius: 12px; font-weight: 800; border: none; background: var(--primary); color: white;">Ingresar</button>

            <div style="text-align: center; display: flex; flex-direction: column; gap: 15px;">
                <a href="forget-password.html" style="font-size: 0.9rem; color: #a8a29e; text-decoration: none;">
                    ¿Olvidaste tu contraseña?
                </a>
                <div style="width: 100%; height: 1px; background: rgba(255,255,255,0.05); margin: 5px 0;"></div>
                <span style="font-size: 0.9rem; color: #a8a29e;">
                    ¿No tienes una cuenta?
                    <a href="register.html" style="color: var(--primary); font-weight: bold; text-decoration: none;">
                        Regístrate
                    </a>
                </span>
            </div>
        </form>
    </div>

    <!-- SCRIPT DE CONEXIÓN CON EL BACKEND -->
    <script src="../src/js/login.js"></script>

</body>
</html>
