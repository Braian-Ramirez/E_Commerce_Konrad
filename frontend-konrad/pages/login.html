<!DOCTYPE html>
<html lang="es-co">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Konrad Shop</title>
    <!-- Mismos estilos y fuentes de nuestro Home -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- OJO a la ruta: salimos de 'pages' (../) y entramos a 'src/css' -->
    <link rel="stylesheet" href="../src/css/style.css" />
</head>

<body style="display: flex; justify-content: center; align-items: center; height: 100vh;">

    <!-- Bolas de neón de fondo (El toque premium) -->
    <div class="floating-orb orb-1" style="width: 400px; height: 400px; top: 10%; right: 10%;"></div>
    <div class="floating-orb orb-2" style="width: 500px; height: 500px; bottom: 0; left: -5%;"></div>

    <!-- TARJETA DE LOGIN -->
    <div class="product-card" style="width: 100%; max-width: 400px; z-index: 10; padding: 40px;">
        <div style="text-align: center; margin-bottom: 30px;">
            <a href="../index.html" style="text-decoration: none;">
                <h1 style="font-size: 2rem; color: var(--text-light);">🛍️ Konrad<span
                        style="color: var(--primary);">Shop</span></h1>
            </a>
            <p style="color: var(--text-muted); margin-top: 5px;">Bienvenido de nuevo</p>
        </div>

        <form id="loginForm">
            <div style="margin-bottom: 20px;">
                <label
                    style="display: block; font-size: 0.9rem; color: var(--text-muted); margin-bottom: 8px;">Usuario</label>
                <input type="text" id="username" class="search-bar" style="width: 100%; border-radius: 8px;"
                    placeholder="Tu usuario_konrad" required>
            </div>

            <div style="margin-bottom: 30px;">
                <label
                    style="display: block; font-size: 0.9rem; color: var(--text-muted); margin-bottom: 8px;">Contraseña</label>
                <input type="password" id="password" class="search-bar" style="width: 100%; border-radius: 8px;"
                    placeholder="••••••••" required>
            </div>

            <button type="submit" class="cta-primary" style="width: 100%; margin-bottom: 20px;">Ingresar</button>

            <!-- Nuevos Enlaces de Ayuda Estilizados -->
            <div style="text-align: center; display: flex; flex-direction: column; gap: 15px;">
                <a href="/pages/forget-password.html" class="nav-item"
                    style="font-size: 0.9rem; color: var(--text-muted); text-decoration: underline;">
                    ¿Olvidaste tu contraseña? Haz clic aquí
                </a>

                <div style="width: 100%; height: 1px; background: var(--glass-border); margin: 5px 0;"></div>

                <span style="font-size: 0.9rem; color: var(--text-muted);">
                    ¿No tienes una cuenta?
                    <a href="/pages/register.html" class="nav-item"
                        style="color: var(--primary); font-weight: bold; text-decoration: none;">
                        ¡Regístrate ahora!
                    </a>
                </span>
            </div>

        </form>
    </div>

</body>

</html>
