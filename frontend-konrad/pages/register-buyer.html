<!DOCTYPE html>
<html lang="es-co">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Comprador | Konrad Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- 1. Estilos Globales -->
    <link rel="stylesheet" href="../src/css/style.css" />
    <!-- 2. CSS Modular Comprador (Limpio) -->
    <link rel="stylesheet" href="../src/css/buyer.css" />
</head>

<body class="body-register">

    <!-- Esfera flotante decorativa -->
    <div class="floating-orb orb-2"
        style="width: min(500px, 80vw); height: min(500px, 80vw); top: 10%; right: -5%; background: linear-gradient(135deg, #3b82f6, #93c5fd); opacity: 0.5;">
    </div>

    <!-- TARJETA DE REGISTRO COMPRADOR -->
    <div class="buyer-card">

        <a href="register.html" class="back-link">← Regresar</a>

        <header class="form-header">
            <div class="icon">🛍️</div>
            <h2>Crea tu Cuenta Comprador</h2>
            <p>Empieza a descubrir tecnología de punta.</p>
        </header>

        <form id="buyerRegisterForm">
            <!-- Datos Personales -->
            <div class="form-twocol">
                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" id="nombre" class="search-bar input-full" placeholder="Tus nombres" required>
                </div>
                <div class="form-group">
                    <label>Apellido</label>
                    <input type="text" id="apellido" class="search-bar input-full" placeholder="Tus apellidos" required>
                </div>
            </div>

            <div class="form-twocol">
                <div class="form-group">
                    <label>Documento de Identidad</label>
                    <div style="display: flex; gap: 8px;">
                        <select id="tipo_documento" class="search-bar form-input" style="width: 35%;" required>
                            <option value="CC" selected>C.C.</option>
                            <option value="CE">C.E.</option>
                            <option value="PA">Pas.</option>
                        </select>
                        <input type="number" id="numero_identificacion" class="search-bar input-full"
                            style="width: 65%;" placeholder="Ej: 10203040" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Teléfono</label>
                    <input type="tel" id="telefono" class="search-bar input-full" placeholder="Ej: 300 000 0000"
                        required>
                </div>
            </div>

            <div class="form-twocol">
                <div class="form-group">
                    <label>País</label>
                    <select id="pais" class="search-bar form-input input-full" required>
                        <option value="" disabled selected>País...</option>
                        <option value="CO">Colombia</option>
                        <option value="MX">México</option>
                        <option value="PE">Perú</option>
                        <option value="CL">Chile</option>
                        <option value="JP">Japón</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Ciudad</label>
                    <input type="text" id="ciudad" class="search-bar input-full" placeholder="Ej: Bogotá" required>
                </div>
            </div>

            <div class="form-group">
                <label>Correo Electrónico</label>
                <input type="email" id="email" class="search-bar input-full" placeholder="tucorreo@konrad.edu.co"
                    required>
            </div>

            <div class="form-group">
                <label>Dirección de Envío</label>
                <input type="text" id="direccion" class="search-bar input-full"
                    placeholder="Ej: Calle 100 #... Conjunto Residencial..." required>
            </div>

            <div class="divider"></div>
            <p class="section-title">Completa tu Perfil (Opcional)</p>

            <div class="form-twocol">
                <div class="form-group">
                    <label>Instagram</label>
                    <input type="text" id="instagram" class="search-bar input-full" placeholder="@usuario">
                </div>
                <div class="form-group">
                    <label>Twitter / X</label>
                    <input type="text" id="twitter" class="search-bar input-full" placeholder="@usuario">
                </div>
            </div>

            <button type="submit" class="cta-primary" style="width: 100%; background: #3b82f6;">Finalizar Registro
                ✅</button>
        </form>
    </div>

    <!-- MODAL DE RESULTADO -->
    <div id="modalResultado" class="modal-overlay">
        <div class="modal-content">
            <div id="modalIcono" style="font-size:3rem; margin-bottom:15px;"></div>
            <h3 id="modalTitulo" style="font-size:1.4rem; color:#f8fafc; margin-bottom:10px;"></h3>
            <p id="modalMensaje" style="color:#94a3b8; font-size:0.95rem; line-height:1.5; margin-bottom:25px;"></p>
        </div>
    </div>

    <script src="../src/js/register-buyer.js"></script>
</body>

</html>
