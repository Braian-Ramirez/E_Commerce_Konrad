<!DOCTYPE html>
<html lang="es-co">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Comprador | Konrad Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- 1. Estilos Globales (Fondo, variables, botones base) -->
    <link rel="stylesheet" href="../src/css/style.css" />
    <!-- 2. Tu nuevo CSS Modular de Compardor (Azul) -->
    <link rel="stylesheet" href="../src/css/buyer.css" />

</head>

<body style="display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 40px 0;">

    <div class="floating-orb orb-2"
        style="width: 500px; height: 500px; top: 10%; right: 10%; background: linear-gradient(135deg, #3b82f6, #93c5fd);">
    </div>

    <!-- TARJETA DE REGISTRO COMPRADOR -->
    <div class="product-card"
        style="width: 100%; max-width: 550px; z-index: 10; padding: 35px; border-color: rgba(59, 130, 246, 0.4); box-shadow: 0 10px 40px rgba(59, 130, 246, 0.1);">

        <a href="register.html"
            style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem; margin-bottom: 20px; display: inline-block;">
            ← Atrás
        </a>

        <div style="text-align: center; margin-bottom: 30px;">
            <div style="font-size: 3rem; margin-bottom: 5px;">🛍️</div>
            <h2 style="font-size: 1.8rem; color: var(--text-light); margin-bottom: 8px;">Crea tu Cuenta Comprador</h2>
            <p style="color: var(--text-muted); font-size: 0.95rem;">Empieza a descubrir tecnología de punta.</p>
        </div>

        <form id="buyerRegisterForm">
            <!-- Datos Personales (2 Columnas) -->
            <div class="form-twocol" style="margin-bottom: 15px;">
                <div>
                    <label
                        style="display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px;">Nombre</label>
                    <input type="text" id="nombre" class="search-bar" style="width: 100%; border-radius: 8px;"
                        placeholder="Tus nombres" required>
                </div>
                <div>
                    <label
                        style="display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px;">Apellido</label>
                    <input type="text" id="apellido" class="search-bar" style="width: 100%; border-radius: 8px;"
                        placeholder="Tus apellidos" required>
                </div>
            </div>

            <div class="form-twocol" style="margin-bottom: 15px;">
                <div>
                    <label
                        style="display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px;">Documento
                        de Identidad</label>
                    <div style="display: flex; gap: 8px;">
                        <!-- Selector de Tipo -->
                        <select id="tipo_documento" class="search-bar"
                            style="width: 35%; border-radius: 8px; color: white; background-color: rgba(255,255,255,0.02); height: 42px; padding: 0 10px; appearance: none; text-align: center;"
                            required>
                            <option value="CC" selected>C.C.</option>
                            <option value="CE">C.E.</option>
                            <option value="PA">Pas.</option>
                        </select>
                        <!-- Número de Documento -->
                        <input type="number" id="numero_identificacion" class="search-bar"
                            style="width: 65%; border-radius: 8px; height: 42px; padding: 0 15px;"
                            placeholder="Ej: 10203040" required>
                    </div>
                </div>
                <div>
                    <label
                        style="display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px;">Teléfono</label>
                    <input type="tel" id="telefono" class="search-bar"
                        style="width: 100%; border-radius: 8px; height: 42px; padding: 0 15px;"
                        placeholder="Ej: 300 000 0000" required>
                </div>
            </div>
            <div class="form-twocol" style="margin-bottom: 15px;">
                <div>
                    <label
                        style="display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px;">País</label>
                    <!-- Forzamos la altura a 42px y color blanco para el select -->
                    <select id="pais" class="search-bar"
                        style="width: 100%; border-radius: 8px; color: white; appearance: none; background-color: rgba(255,255,255,0.02); height: 42px; padding: 0 15px;"
                        required>
                        <option value="" disabled selected>País...</option>
                        <option value="CO">Colombia</option>
                        <option value="MX">México</option>
                        <option value="PE">Perú</option>
                        <option value="CL">Chile</option>
                        <option value="JP">Japón</option>
                    </select>
                </div>
                <div>
                    <!-- Acortamos el label para evitar que salte de línea -->
                    <label
                        style="display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px;">Ciudad</label>
                    <input type="text" id="ciudad" class="search-bar"
                        style="width: 100%; border-radius: 8px; height: 42px; padding: 0 15px;" placeholder="Ej: Bogotá"
                        required>
                </div>
            </div>
            <div style="margin-bottom: 15px;">
                <label style="display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px;">Correo
                    Electrónico</label>
                <input type="email" id="email" class="search-bar" style="width: 100%; border-radius: 8px;"
                    placeholder="tucorreo@konrad.edu.co" required>
            </div>
            <div style="margin-bottom: 20px;">
                <label
                    style="display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px;">Dirección
                    de Envío</label>
                <input type="text" id="direccion" class="search-bar"
                    style="width: 100%; border-radius: 8px; height: 42px; padding: 0 15px;"
                    placeholder="Ej: Calle 100 #... Conjunto Residencial..." required>
            </div>
            <!-- Datos Sociales Opcionales -->
            <div style="width: 100%; height: 1px; background: rgba(255,255,255,0.1); margin: 20px 0;"></div>
            <p
                style="font-size: 0.8rem; color: var(--primary); font-weight: bold; margin-bottom: 15px; text-transform: uppercase;">
                Completa tu Perfil (Opcional)</p>

            <div class="form-twocol" style="margin-bottom: 30px;">
                <div>
                    <label
                        style="display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px;">Instagram</label>
                    <input type="text" id="instagram" class="search-bar" style="width: 100%; border-radius: 8px;"
                        placeholder="@usuario">
                </div>
                <div>
                    <label
                        style="display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px;">Twitter
                        / X</label>
                    <input type="text" id="twitter" class="search-bar" style="width: 100%; border-radius: 8px;"
                        placeholder="@usuario">
                </div>
            </div>
            <button type="submit" class="cta-primary" style="width: 100%; background: #3b82f6;">Finalizar Registro
                ✅</button>
        </form>
    </div>
    <!-- MODAL DE RESULTADO -->
    <div id="modalResultado"
        style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:9999; justify-content:center; align-items:center;">
        <div
            style="background:#1e293b; border:1px solid rgba(255,255,255,0.1); border-radius:20px; padding:40px; max-width:420px; width:90%; text-align:center; box-shadow:0 20px 60px rgba(0,0,0,0.5);">
            <div id="modalIcono" style="font-size:3rem; margin-bottom:15px;"></div>
            <h3 id="modalTitulo" style="font-size:1.4rem; color:#f8fafc; margin-bottom:10px;"></h3>
            <p id="modalMensaje" style="color:#94a3b8; font-size:0.95rem; line-height:1.5; margin-bottom:25px;"></p>
            <button id="modalBtn"
                style="padding:12px 35px; border-radius:100px; border:none; font-family:'Outfit',sans-serif; font-weight:700; font-size:1rem; cursor:pointer;">
                Aceptar
            </button>
        </div>
    </div>
    <script src="../src/js/register-buyer.js"></script>
</body>

</html>
