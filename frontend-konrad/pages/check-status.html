<!DOCTYPE html>
<html lang="es-co">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta tu Estado | Comercial Konrad</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/css/style.css">
</head>
<body>
    <header class="navbar glass-effect">
        <div class="nav-brand">
            <h1>🛍️Comercial<span>Konrad</span></h1>
        </div>
        <nav class="nav-links">
            <a href="/index.html" class="nav-item">🏠 Inicio</a>
            <a href="/pages/catalog.html" class="nav-item">💎 Catálogo</a>
            <button class="cart-btn" onclick="window.location.href='/pages/cart.html'">🛒 Carrito</button>
        </nav>
    </header>

    <div class="dashboard-container" style="margin-top: 100px;">
        <aside class="sidebar-nav">
          <div class="sidebar-section">
            <p class="section-title">Navegación</p>
            <a href="/index.html" class="sidebar-item"><span class="icon">🏠</span> Inicio</a>
            <a href="/pages/my-orders.html" class="sidebar-item"><span class="icon">🛍️</span> Mis Compras</a>
            <a href="/pages/payment-methods.html" class="sidebar-item"><span class="icon">💳</span> Medios de Pago</a>
            <a href="/pages/profile.html" class="sidebar-item"><span class="icon">👤</span> Mi Perfil</a>
          </div>
          <button onclick="localStorage.clear(); window.location.href='/pages/login.html'" class="logout-btn" style="width: 100%; margin-top: 40px; background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); padding: 12px; border-radius: 10px; cursor: pointer; font-weight: 600;">🚪 Cerrar Sesión</button>
        </aside>

        <main class="main-content" style="padding: 40px 60px;">
            <div style="text-align: center; margin-bottom: 50px;">
                <h2 style="font-size: 2.5rem; margin-bottom: 15px;">Consulta tu Estado</h2>
                <p style="color: #94a3b8; max-width: 600px; margin: 0 auto;">Ingresa tu número de identificación o radicado para saber cómo va tu proceso con Konrad Shop.</p>
            </div>

            <div class="form-card" style="max-width: 600px; margin: 0 auto; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); text-align: center;">
                <div class="input-group" style="margin-bottom: 25px;">
                    <label>ID o No. Radicado</label>
                    <input type="text" id="statusId" placeholder="Ej: 10102020 o RAD-0001" style="text-align: center; font-size: 1.1rem; padding: 18px;">
                </div>
                <button class="cta-primary" id="checkStatusBtn" style="width: 100%; padding: 18px;">Consultar ahora 🔍</button>
                
                <div id="statusResult" style="margin-top: 40px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 30px; display: none;">
                    <div style="background: rgba(99,102,241,0.1); color: #818cf8; padding: 20px; border-radius: 12px; margin-bottom: 20px;">
                        <strong>Estado Actual:</strong> <span id="statusValue">PENDIENTE</span>
                    </div>
                    <p id="statusMsg" style="font-size: 0.9rem; color: #94a3b8; line-height: 1.6;"></p>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        document.getElementById('checkStatusBtn').onclick = () => {
            const result = document.getElementById('statusResult');
            const value = document.getElementById('statusValue');
            const msg = document.getElementById('statusMsg');
            
            result.style.display = 'block';
            value.textContent = 'PENDIENTE';
            msg.textContent = 'Si el estado de su solicitud es "PENDIENTE" en los próximos días será evaluado. De lo contrario recibirá un correo con más información sobre el estado de su solicitud.';
        };
    </script>
</body>
</html>
