<!DOCTYPE html>
<html lang="es-co">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Compras | Comercial Konrad</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/css/style.css">
    <link rel="stylesheet" href="/src/css/buyer-common.css">
    <link rel="stylesheet" href="/src/css/orders.css">
</head>
<body>
    <header class="navbar">
        <div class="nav-brand">
            <a href="/index.html" style="text-decoration: none;">
                <h1>🛍️Comercial<span style="color: var(--primary);">Konrad</span></h1>
            </a>
        </div>
        <div class="search-container">
            <div class="search-wrapper">
                <span>🔍</span>
                <input type="text" placeholder="Buscar productos... (ej: Sony, Mac)">
            </div>
        </div>
        <nav class="nav-links">
            <a href="/pages/buyer-dashboard.html" class="nav-item">🏠 <span>Inicio</span></a>
            <a href="/pages/catalog.html" class="nav-item">💎 <span>Catálogo</span></a>
            <button class="cart-btn" onclick="window.location.href='/pages/cart.html'">🛒 <span>Carrito</span> <span id="cartCount" class="badge">0</span></button>
        </nav>
    </header>

    <div class="dashboard-container">
        <aside class="sidebar-nav">
            <div class="sidebar-section">
                <p class="section-title">Navegación</p>
                <a href="/pages/buyer-dashboard.html" class="sidebar-item"><span class="icon">🏠</span> Inicio</a>
                <a href="/pages/my-orders.html" class="sidebar-item active"><span class="icon">🛍️</span> Mis Compras</a>
                <a href="/pages/favorites.html" class="sidebar-item"><span class="icon">❤️</span> Favoritos</a>
                <a href="/pages/payment-methods.html" class="sidebar-item"><span class="icon">💳</span> Medios de Pago</a>
                <a href="/pages/profile.html" class="sidebar-item"><span class="icon">👤</span> Mi Perfil</a>
            </div>
            <button onclick="handleLogout()" class="logout-btn">🚪 Cerrar Sesión</button>
        </aside>

        <main class="main-content">
            <h2 class="orders-header">Mi Historial de Compras</h2>
            <div id="ordersList" class="orders-grid">
                <p class="empty-state-favs">Buscando tus pedidos...</p>
            </div>
        </main>
    </div>

    <!-- MODAL DETALLES ÓRDEN -->
    <div id="orderDetailModal" class="modal" style="display: none;">
        <div class="glass-effect modal-card">
            <button id="closeOrderModal" class="close-modal-round">✕</button>
            <div id="orderModalContent"></div>
        </div>
    </div>

    <!-- MODAL CALIFICACIÓN -->
    <div id="ratingModal" class="modal" style="display: none;">
        <div class="glass-effect modal-card" style="max-width: 450px;">
            <button id="closeRatingModal" class="close-modal-round">✕</button>
            <h3 style="margin-bottom: 20px; display: flex; align-items: center; gap: 10px;">⭐ Calificar Compra</h3>
            <p style="color: #94a3b8; font-size: 0.9rem; margin-bottom: 20px;">Tu opinión es vital para la comunidad Konrad Shop. (Rango 1-10)</p>
            <form id="ratingForm">
                <input type="number" id="ratingValue" min="1" max="10" value="10"
                    style="width: 100%; padding: 15px; border-radius: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; font-size: 1.5rem; text-align: center; margin-bottom: 20px; outline: none; font-weight: 800;">
                <textarea id="ratingComment" placeholder="Cuéntanos tu experiencia..."
                    style="width: 100%; padding: 15px; border-radius: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; height: 120px; resize: none; margin-bottom: 25px; outline: none;"></textarea>
                <div style="display: flex; gap: 15px;">
                    <button type="button" id="cancelRating" style="flex: 1; background: transparent; border: none; color: #94a3b8; cursor: pointer; font-weight: 600;">Cancelar</button>
                    <button type="submit" class="cta-primary" style="flex: 2; padding: 14px;">Enviar Calificación</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="/src/js/my-orders.js"></script>
</body>
</html>
