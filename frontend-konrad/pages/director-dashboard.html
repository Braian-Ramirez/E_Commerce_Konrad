<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Director Comercial | Konrad Commerce</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../src/css/style.css">
    <link rel="stylesheet" href="../src/css/dashboard.css">
</head>

<body>

    <!-- 1. BARRA LATERAL (SIDEBAR)-->
    <aside class="sidebar">
        <div class="sidebar-title">Comercial<span style="color: #22c55e;">Konrad</span></div>
        <nav class="nav-menu">
            <a href="director-dashboard.html" class="nav-item active">💼 Solicitudes Pendientes</a>
            <a href="director-historial.html" class="nav-item">📜 Historial Solicitudes</a>
            <a href="#" class="nav-item">📊 Dashboard BAM</a>
            <a href="#" class="nav-item">👤 Mi Perfil</a>
        </nav>

        <div style="margin-top: auto;">
            <a href="../index.html" class="nav-item" style="color: #ef4444;">🚪 Cerrar Sesión</a>
        </div>
    </aside>

    <!-- 2. CONTENIDO PRINCIPAL-->
    <main class="main-content">
        <header class="header-top">
            <h2 style="font-weight: 800; margin: 0;">Solicitudes Pendientes</h2>
            <div style="opacity: 0.5;">Panel Administrativo</div>
        </header>

        <section class="content-body">
            <h3 style="margin-top: 0; font-weight: 400; color: #a8a29e;">Listado de solicitudes:</h3>

            <!-- BARRA DE FILTROS -->
            <div class="filter-bar">
                <input type="text" placeholder="Buscar por # Identificación" class="search-mini">
                <button class="btn-filter">📅 Filtrar por fecha</button>
            </div>

            <!-- CABECERA DE TABLA -->
            <div
                style="display: grid; grid-template-columns: 1fr 1fr 1.5fr 1fr 1fr; padding: 0 20px 15px; color: #78716c; font-size: 0.85rem; font-weight: 700;">
                <div># IDENTIFICACIÓN</div>
                <div>APELLIDOS / NOMBRES</div>
                <div>CORREO ELECTRÓNICO</div>
                <div style="text-align: center;">ESTADO</div>
                <div>FECHA CREACIÓN</div>
            </div>
            <div id="solicitudesContainer">
            </div>
        </section>
    </main>
    <script src="../src/js/director-dashboard.js"></script>
</body>

</html>
