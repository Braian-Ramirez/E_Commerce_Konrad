<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Director Comercial | Konrad Commerce</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../src/css/style.css">
    <link rel="stylesheet" href="../src/css/dashboard.css">
</head>

<body>

    <!-- 1. BARRA LATERAL (SIDEBAR)-->
    <aside class="sidebar">
        <div class="sidebar-title">Comercial<span style="color: #22c55e;">Konrad</span></div>
        <nav class="nav-menu">
            <a href="director-dashboard.html" class="sidebar-item active">💼 Solicitudes Pendientes</a>
            <a href="director-historial.html" class="sidebar-item">📜 Historial Solicitudes</a>
            <a href="director-bam.html" class="sidebar-item">📊 Dashboard BAM</a>
            <a href="#" class="sidebar-item">👤 Mi Perfil</a>
        </nav>

        <div style="margin-top: auto;">
            <button onclick="handleLogout()" class="sidebar-item" style="background:none; border:none; color: #ef4444; width: 100%; text-align: left; cursor: pointer; font-family: inherit;">
                🚪 Cerrar Sesión
            </button>
        </div>
    </aside>

    <!-- 2. CONTENIDO PRINCIPAL-->
    <main class="main-content">
        <header class="header-top">
            <h2 style="font-weight: 800; margin: 0;">Solicitudes Pendientes</h2>
            
            <div style="display: flex; align-items: center; gap: 20px;">
                <!-- CAMPANA DE NOTIFICACIONES -->
                <div class="notification-container" style="position: relative;">
                    <button id="btnNotificaciones" class="bell-btn" style="background: none; border: none; font-size: 1.5rem; cursor: pointer; position: relative;">
                        🔔
                        <span id="notifCount" class="badge-count" style="display: none; position: absolute; top: -5px; right: -5px; background: #ef4444; color: white; font-size: 0.6rem; padding: 2px 6px; border-radius: 10px; border: 2px solid #0c0a09; font-weight: 800;">0</span>
                    </button>
                    
                    <!-- DROPDOWN DE NOTIFICACIONES -->
                    <div id="notifDropdown" class="notif-dropdown" style="display: none; position: absolute; top: 40px; right: 0; width: 320px; background: #141210; border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; z-index: 1000; box-shadow: 0 10px 25px rgba(0,0,0,0.5); overflow: hidden;">
                        <div style="padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); font-weight: 800; font-size: 0.9rem; display: flex; justify-content: space-between;">
                            <span>Notificaciones</span>
                            <span style="color: #22c55e; cursor: pointer; font-size: 0.75rem;">Limpiar</span>
                        </div>
                        <div id="notifList" style="max-height: 350px; overflow-y: auto;">
                            <!-- Listado dinámico -->
                            <div style="padding: 20px; text-align: center; color: #a8a29e; font-size: 0.8rem;">
                                No tienes notificaciones nuevas.
                            </div>
                        </div>
                    </div>
                </div>

                <div style="opacity: 0.5;">Panel Administrativo</div>
            </div>
        </header>

        <section class="content-body">
            <h3 style="margin-top: 0; font-weight: 400; color: #a8a29e;">Listado de solicitudes:</h3>

            <!-- BARRA DE FILTROS -->
            <div class="filter-bar">
                <input type="text" id="searchInput" placeholder="🔍Buscar por Número de Identificación" class="search-mini">
                <input type="date" id="dateInput" class="btn-filter" style="color-scheme: dark; cursor: pointer;" title="Filtrar por fecha exacta">
            </div>

            <!-- CABECERA DE TABLA -->
            <div
                style="display: grid; grid-template-columns: 1fr 1fr 1.5fr 1fr 1fr; padding: 0 20px 15px; color: #78716c; font-size: 0.85rem; font-weight: 700;">
                <div># IDENTIFICACIÓN</div>
                <div>APELLIDOS / NOMBRES</div>
                <div>CORREO ELECTRÓNICO</div>
                <div style="text-align: center;">ESTADO</div>
                <div>FECHA CREACIÓN</div>
            </div>
            <div id="solicitudesContainer">
            </div>
        </section>
    </main>
    <script src="../src/js/notifications-controller.js"></script>
    <script src="../src/js/director-dashboard.js"></script>
    <script type="module" src="../src/js/main.js"></script>
</body>

</html>
