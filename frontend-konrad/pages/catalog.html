<!DOCTYPE html>
<html lang="es-co">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Completo | Comercial Konrad</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/css/style.css">
</head>
<body>
    <header class="navbar glass-effect" style="display:flex;justify-content:space-between;align-items:center;">
        <div class="nav-brand">
            <h1>🛍️Comercial<span>Konrad</span></h1>
        </div>
        
        <!-- BARRA DE BÚSQUEDA -->
        <div style="flex:1;max-width:400px;margin:0 20px;">
            <div style="display:flex;align-items:center;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:8px 15px;backdrop-filter:blur(10px);">
                <input type="text" id="searchInput" placeholder="Buscar productos... (ej: Sony, Mac)" style="background:transparent;border:none;color:white;outline:none;width:100%;font-size:0.95rem;font-family:'Outfit',sans-serif;">
                <button id="searchBtn" style="background:transparent;border:none;color:var(--primary);cursor:pointer;font-size:1.1rem;margin-left:8px;font-weight:900;">🔍</button>
            </div>
        </div>

        <nav class="nav-links">
            <a href="/index.html" class="nav-item">🏠 Inicio</a>
            <a href="/pages/catalog.html" class="nav-item active">💎 Catálogo</a>
            <button class="cart-btn" onclick="window.location.href='/pages/cart.html'">🛒 Carrito <span id="cartCount" class="badge">0</span></button>
        </nav>
    </header>

    <div class="dashboard-container" style="margin-top: 100px;">
        <!-- SIDEBAR SINCRONIZADO (EL QUE PEDISTE ARREGLAR) -->
        <aside class="sidebar-nav">
          <div class="sidebar-section">
            <p class="section-title">Mi Cuenta</p>
            <a href="/index.html" class="sidebar-item">
                <span class="icon">🏠</span> Inicio
            </a>
            <a href="/pages/my-orders.html" class="sidebar-item">
                <span class="icon">🛍️</span> Mis Compras
            </a>
            <a href="/pages/favorites.html" class="sidebar-item">
                <span class="icon">❤️</span> Favoritos
            </a>
            <a href="/pages/payment-methods.html" class="sidebar-item">
                <span class="icon">💳</span> Medios de Pago
            </a>
            <a href="/pages/profile.html" class="sidebar-item">
                <span class="icon">👤</span> Mi Perfil
            </a>
          </div>

          <div class="sidebar-section" style="margin-top: 30px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 25px;">
            <p class="section-title">Explorar por Categoría</p>
            <div class="filter-group-v">
                <label class="filter-option">
                    <input type="checkbox" id="cat-all" checked> Todos los productos
                </label>
                <label class="filter-option">
                    <input type="checkbox" class="cat-filter" value="Tecnología"> 💻 Tecnología
                </label>
                <label class="filter-option">
                    <input type="checkbox" class="cat-filter" value="Moda"> ✨ Moda
                </label>
                <label class="filter-option">
                    <input type="checkbox" class="cat-filter" value="Hogar"> 🏠 Hogar
                </label>
            </div>
          </div>

          <div class="sidebar-section" style="margin-top: 25px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 20px;">
            <p class="section-title">Presupuesto</p>
            <div style="padding: 0 10px;">
                <input type="range" id="priceRange" min="0" max="20000000" step="500000" value="20000000" style="width: 100%; accent-color: var(--primary);">
                <div style="display: flex; justify-content: space-between; font-size: 0.85rem; margin-top: 10px; color: #94a3b8;">
                    <span>$0</span>
                    <span id="priceValue" style="color: var(--primary); font-weight: 800;">$20M+</span>
                </div>
            </div>
          </div>

          <button onclick="localStorage.removeItem('access_token'); localStorage.removeItem('refresh_token'); localStorage.removeItem('user_data'); window.location.href='/pages/login.html'" class="logout-btn" style="width: 100%; margin-top: auto; background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); padding: 12px; border-radius: 10px; cursor: pointer; font-weight: 600;">🚪 Cerrar Sesión</button>
        </aside>

        <main class="main-content" style="padding: 0 40px;">
            <div style="margin-bottom: 40px;">
                <h2 style="font-size: 2.8rem; font-weight: 800; margin-bottom: 10px;">Catálogo Completo</h2>
                <p style="color: #94a3b8; font-size: 1.1rem;">Explora nuestra selección exclusiva de más de 20 productos.</p>
            </div>
            
            <div id="productGrid" class="products-grid">
                <!-- Se llena con main.js -->
            </div>
        </main>
    </div>

    <!-- MODAL DE DETALLES (REPLICADO DEL INICIO) -->
    <div id="productDetailModal" class="modal" style="display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.9); position: fixed; inset: 0; z-index: 2000;">
        <div class="glass-effect" style="width: 90%; max-width: 950px; padding: 40px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); position: relative; max-height: 90vh; overflow-y: auto;">
            <button id="closeModal" style="position: absolute; top: 25px; right: 25px; background: rgba(255,255,255,0.05); border: none; width: 40px; height: 40px; border-radius: 50%; color: white; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center;">✕</button>
            <div id="modalContent">
                <!-- Se llena dinámicamente -->
            </div>
        </div>
    </div>

    <script type="module" src="/src/js/main.js"></script>
</body>
</html>
