<!DOCTYPE html>
<html lang="es-co">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Completo | Comercial Konrad</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/css/style.css">
    <link rel="stylesheet" href="/src/css/buyer-common.css">
    <link rel="stylesheet" href="/src/css/catalog.css">
</head>
<body>
    <header class="navbar glass-effect">
        <div class="nav-brand">
            <a href="/index.html" style="text-decoration: none;">
                <h1>🛍️Comercial<span style="color: var(--primary);">Konrad</span></h1>
            </a>
        </div>
        
        <!-- BARRA DE BÚSQUEDA -->
        <div class="search-container">
            <div class="search-wrapper">
                <input type="text" id="searchInput" placeholder="Buscar productos... (ej: Sony, Mac)">
                <button id="searchBtn">🔍</button>
            </div>
        </div>

        <nav class="nav-links">
            <a href="/pages/buyer-dashboard.html" class="nav-item">🏠 Inicio</a>
            <a href="/pages/catalog.html" class="nav-item active">💎 Catálogo</a>
            <button class="cart-btn" onclick="window.location.href='/pages/cart.html'">🛒 Carrito <span id="cartCount" class="badge">0</span></button>
        </nav>
    </header>

    <div class="dashboard-container">
        <!-- SIDEBAR CONDICIONAL SEGÚN SESIÓN -->
        <aside class="sidebar-nav" id="catalogSidebar"></aside>
        <script>
          (function() {
            const token = localStorage.getItem('access_token');
            const sidebar = document.getElementById('catalogSidebar');
            
            const accountSection = token ? `
              <div class="sidebar-section">
                <p class="section-title">Navegación</p>
                <a href="/pages/buyer-dashboard.html" class="sidebar-item"><span class="icon">🏠</span> Inicio</a>
                <a href="/pages/my-orders.html" class="sidebar-item"><span class="icon">🛍️</span> Mis Compras</a>
                <a href="/pages/favorites.html" class="sidebar-item"><span class="icon">❤️</span> Favoritos</a>
                <a href="/pages/payment-methods.html" class="sidebar-item"><span class="icon">💳</span> Medios de Pago</a>
                <a href="/pages/profile.html" class="sidebar-item"><span class="icon">👤</span> Mi Perfil</a>
              </div>` : `
              <div class="sidebar-section login-prompt">
                <div class="login-prompt-icon">👤</div>
                <a href="/pages/login.html" class="cta-primary">🔐 Iniciar Sesión</a>
                <a href="/pages/register.html" class="register-link">
                  ¿Sin cuenta? <span style="color:var(--primary);">Regístrate</span>
                </a>
              </div>`;

            const filtersSection = `
              <div class="sidebar-section" style="margin-top:25px; border-top:1px solid rgba(255,255,255,0.05); padding-top:25px;">
                <p class="section-title">Explorar por Categoría</p>
                <div class="filter-group-v">
                  <label class="filter-option"><input type="checkbox" id="cat-all" checked> Todos los productos</label>
                  <label class="filter-option"><input type="checkbox" class="cat-filter" value="Tecnología"> 💻 Tecnología</label>
                  <label class="filter-option"><input type="checkbox" class="cat-filter" value="Moda"> ✨ Moda</label>
                  <label class="filter-option"><input type="checkbox" class="cat-filter" value="Hogar"> 🏠 Hogar</label>
                </div>
              </div>
              <div class="sidebar-section" style="margin-top:20px; border-top:1px solid rgba(255,255,255,0.05); padding-top:20px;">
                <p class="section-title">Presupuesto</p>
                <div class="price-filter-container">
                  <input type="range" id="priceRange" class="price-range-input" min="0" max="20000000" step="500000" value="20000000">
                  <div class="price-labels">
                    <span>$0</span>
                    <span id="priceValue" class="price-current">$20M+</span>
                  </div>
                </div>
              </div>`;

            const logoutBtn = token ? `
              <button onclick="handleLogout()" class="logout-btn">
                🚪 Cerrar Sesión
              </button>` : '';

            sidebar.innerHTML = accountSection + filtersSection + logoutBtn;
          })();
        </script>

        <main class="main-content">
            <div class="catalog-header">
                <h2>Catálogo Completo</h2>
                <p>Explora nuestra selección exclusiva de más de 20 productos.</p>
            </div>
            
            <div id="productGrid" class="products-grid">
                <!-- Se llena con main.js -->
            </div>
        </main>
    </div>

    <!-- MODAL DE DETALLES -->
    <div id="productDetailModal" class="modal" style="display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.9); position: fixed; inset: 0; z-index: 2000;">
        <div class="glass-effect" style="width: 92%; max-width: 1100px; padding: 40px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); position: relative; max-height: 90vh; overflow-y: auto;">
            <button id="closeModal" style="position: absolute; top: 25px; right: 25px; background: rgba(255,255,255,0.05); border: none; width: 40px; height: 40px; border-radius: 50%; color: white; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center;">✕</button>
            <div id="modalContent"></div>
        </div>
    </div>

    <script type="module" src="/src/js/main.js"></script>
</body>

    <script type="module" src="/src/js/main.js"></script>
</body>
</html>
