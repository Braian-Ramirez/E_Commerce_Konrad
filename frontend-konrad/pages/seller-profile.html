<!DOCTYPE html>
<html lang="es-co">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil del Vendedor | Comercial Konrad</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/css/style.css">
</head>
<body>
    <header class="navbar glass-effect">
        <div class="nav-brand" onclick="window.location.href='/index.html'" style="cursor:pointer;"><h1>🛍️Comercial<span>Konrad</span></h1></div>
        <nav class="nav-links">
            <a href="/index.html" class="nav-item">🏠 Inicio</a>
            <a href="/pages/catalog.html" class="nav-item">💎 Catálogo</a>
            <button class="cart-btn" onclick="window.location.href='/pages/cart.html'">🛒 Carrito <span id="cartCount" class="badge">0</span></button>
        </nav>
    </header>

    <div class="dashboard-container" style="flex-direction:column; gap:30px; margin-top:110px; max-width:1200px; margin-left:auto; margin-right:auto; padding:0 20px;">
        <!-- INFO DEL VENDEDOR -->
        <div id="vendorHeader" class="glass-effect" style="padding:40px; border-radius:30px; border:1px solid rgba(255,255,255,0.1); display:flex; align-items:center; gap:40px; animation: fadeInUp 0.6s ease both;">
            <div style="width:120px; height:120px; background:var(--primary); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:4rem; box-shadow: 0 10px 30px rgba(139,92,246,0.3);">👤</div>
            <div>
                <h1 id="vendorName" style="font-size:3rem; font-weight:900; margin:0; color:white;">Vendedor...</h1>
                <p id="vendorBio" style="color:#94a3b8; font-size:1.1rem; margin:10px 0;">Vendedor verificado con garantía real Konrad.</p>
                <div style="display:flex; gap:20px; margin-top:15px;">
                    <div style="background:rgba(34,197,94,0.1); color:#22c55e; padding:8px 15px; border-radius:10px; font-weight:800; font-size:0.9rem;">⭐ 4.9 Reputación</div>
                    <div style="background:rgba(139,92,246,0.1); color:var(--primary); padding:8px 15px; border-radius:10px; font-weight:800; font-size:0.9rem;">+2,000 Ventas</div>
                </div>
            </div>
        </div>

        <!-- PRODUCTOS DEL VENDEDOR -->
        <div>
            <h2 id="vendorTitle" style="font-size:2rem; margin-bottom:25px; font-weight:800;">🛍️ Todos los productos de este vendedor</h2>
            <div id="vendorProducts" class="products-grid">
                <!-- Se cargan vía JS -->
                <p style="color:#94a3b8; text-align:center; grid-column:1/-1; padding:50px;">Cargando catálogo del vendedor...</p>
            </div>
        </div>
    </div>

    <div id="productDetailModal" class="modal" style="display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.9);position:fixed;inset:0;z-index:2000;">
        <div class="glass-effect" style="width:95%;max-width:960px;max-height:85vh;overflow-y:auto;padding:30px;border-radius:30px;border:1px solid rgba(255,255,255,0.1);position:relative;">
            <button id="closeModal" style="position:sticky;top:10px;right:10px;float:right;background:rgba(255,255,255,0.05);border:none;width:40px;height:40px;border-radius:50%;color:white;cursor:pointer;font-size:1.2rem;z-index:50;">✕</button>
            <div id="modalContent"></div>
        </div>
    </div>

    <div id="toast"></div>
    <script type="module" src="/src/js/seller-profile.js"></script>
</body>
</html>
